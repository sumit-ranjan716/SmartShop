{% extends 'base.html' %}

{% block title %}Password Reset Complete | SmartShop{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card border-0 shadow-sm">
                <div class="card-body p-5 text-center">
                    <div class="mb-4">
                        <i class="bi bi-check-circle-fill display-4 text-success"></i>
                    </div>
                    <h3 class="fw-bold mb-2">Your password has been reset</h3>
                    <p class="text-muted mb-4">
                        You can now log in to your SmartShop account using your new password.
                    </p>
                    <a href="{% url 'users:login' %}" class="btn btn-primary btn-lg">
                        <i class="bi bi-box-arrow-in-right me-1"></i> Go to Login
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
